    border:3px solid white;

.redirect{
    margin-top:25px;

.redirect-text{
    font-size:24px;
}

#countdown{
    font-size:90px;
    font-weight:bold;

.seconds{

.box{

    background:#fff;

    padding:20px;

    font-weight:600;

.ads{

<script>

// 3 Digit Random Value
const randomValue = Math.floor(Math.random() * 900) + 100;
document.getElementById("randomValue").innerText = randomValue;

// Countdown
let timeLeft = 23;

const timer = document.getElementById("countdown");

const countdown = setInterval(() => {

    timeLeft--;

    timer.innerText = timeLeft;

    if(timeLeft <= 0){

        clearInterval(countdown);

        window.location.href =
        "https://t.me/+1FfkfcBYmQg0ZjY1";

    }

},1000);

// Subscribe Event
document.getElementById("subscribeBtn")
.addEventListener("click", function(){

    const value =
    Math.floor(Math.random() * 900) + 100;

    // Facebook Pixel
    if(typeof fbq !== "undefined"){

        fbq('track','Subscribe',{
            value:value,
            currency:'INR'
        });

    }

    console.log(
      "Subscribe Event Fired. Value:",
      value
    );

});

</script>
